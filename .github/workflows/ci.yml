name: CI

# Frontend quality gates for Rust Legions. The backend Deno functions run only
# on Base44 and are not executed here; the rules-mirror tests instead read their
# source to enforce the gameEngine ↔ src/lib invariant (see CLAUDE.md).
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # .npmrc pins min-release-age=7 (supply-chain cooldown); honored by ci.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
